<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailSense — Tri terminé !</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">Mail<span>Sense</span></div>
</nav>

<main class="container" style="padding: 60px 24px; text-align:center;">

  <div class="state-icon">🎉</div>
  <h1 style="font-size:2rem; font-weight:800; margin-bottom:12px;">
    Terminé !
  </h1>
  <p style="font-size:1.1rem; color:var(--text2); margin-bottom:8px;">
    <strong id="total-done" style="color:var(--text); font-size:1.4rem;">…</strong> emails triés automatiquement
  </p>
  <p style="color:var(--text2); font-size:0.9rem; margin-bottom:40px;">
    Compte : <span id="user-email" style="color:var(--accent2);">…</span>
  </p>

  <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:48px;">
    <a href="https://mail.google.com" target="_blank" rel="noopener" class="btn btn-primary btn-lg">
      📬 Ouvrir Gmail
    </a>
    <a href="/" class="btn btn-secondary">
      Trier un autre compte
    </a>
  </div>

  <div class="card" style="max-width:560px; margin:0 auto; text-align:left;">
    <h2 style="font-size:1.1rem; font-weight:700; margin-bottom:20px;">Répartition par catégorie</h2>
    <div id="cat-list"></div>
  </div>

  <div class="security-banner" style="max-width:560px; margin:32px auto 0;">
    <span>🛡️</span>
    <span>Vos données ont été purgées de nos serveurs. Aucune information stockée.</span>
  </div>

</main>

<footer>
  <div>MailSense V3 · <a href="/comment-ca-marche">Confidentialité</a></div>
</footer>

<script src="/js/app.js"></script>
</body>
</html>
